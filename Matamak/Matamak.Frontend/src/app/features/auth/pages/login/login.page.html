<article class="auth-card">
  <header>
    <p class="eyebrow">أهلا برجوعك</p>
    <h2>تسجيل الدخول</h2>
    <p>ادخل بيانات حسابك وسيتم تحويلك تلقائيا للواجهة المناسبة: إدارة، كاشير، أو عميل.</p>
  </header>



  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      البريد الإلكتروني
      <input type="email" formControlName="email" autocomplete="email" placeholder="example@mail.com" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span>البريد الإلكتروني مطلوب ويجب أن يكون صحيحا.</span>
      }
    </label>

    <label>
      كلمة المرور
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="********" />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span>كلمة المرور مطلوبة.</span>
      }
    </label>

    <a routerLink="/auth/forgot-password" class="text-link">نسيت كلمة المرور؟</a>

    @if (errorMessage()) {
      <p class="form-alert">{{ errorMessage() }}</p>
    }

    <button type="submit" class="primary-action" [disabled]="!canSubmit()">
      {{ isSubmitting() ? 'جاري تسجيل الدخول...' : 'تسجيل الدخول' }}
    </button>
  </form>

  <footer>
    ليس لديك حساب؟
    <a routerLink="/auth/register">أنشئ حسابا</a>
  </footer>
</article>
