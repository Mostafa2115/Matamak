<article class="auth-card auth-card--wide">
  <header>
    <p class="eyebrow">انضم إلى مطعمك</p>
    <h2>إنشاء حساب جديد</h2>
    <p>سيتم إرسال كود تفعيل إلى بريدك الإلكتروني بعد التسجيل.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="form-grid">
      <label>
        اسم المستخدم
        <input type="text" formControlName="username" autocomplete="username" />
        @if (form.controls.username.touched && form.controls.username.invalid) {
          <span>اسم المستخدم مطلوب ولا يقل عن 8 أحرف.</span>
        }
      </label>

      <label>
        الاسم الكامل
        <input type="text" formControlName="fullName" autocomplete="name" />
        @if (form.controls.fullName.touched && form.controls.fullName.invalid) {
          <span>الاسم الكامل مطلوب.</span>
        }
      </label>

      <label>
        البريد الإلكتروني
        <input type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span>أدخل بريداً إلكترونياً صحيحاً.</span>
        }
      </label>

      <label>
        رقم الهاتف
        <input type="tel" formControlName="phone" autocomplete="tel" />
        @if (form.controls.phone.touched && form.controls.phone.invalid) {
          <span>رقم الهاتف مطلوب.</span>
        }
      </label>
    </div>

    <label>
      العنوان
      <input type="text" formControlName="address" autocomplete="street-address" />
      @if (form.controls.address.touched && form.controls.address.invalid) {
        <span>العنوان مطلوب.</span>
      }
    </label>

    <div class="form-grid">
      <label>
        كلمة المرور
        <input type="password" formControlName="password" autocomplete="new-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span>كلمة المرور مطلوبة ولا تقل عن 6 أحرف.</span>
        }
      </label>

      <label>
        تأكيد كلمة المرور
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
        @if (form.controls.confirmPassword.touched && form.hasError('passwordsMismatch')) {
          <span>كلمتا المرور غير متطابقتين.</span>
        }
      </label>
    </div>

    @if (errorMessage()) {
      <p class="form-alert">{{ errorMessage() }}</p>
    }

    <button type="submit" class="primary-action" [disabled]="!form.valid || isSubmitting()">
      {{ isSubmitting() ? 'جاري إنشاء الحساب...' : 'إنشاء الحساب' }}
    </button>
  </form>

  <footer>
    لديك حساب بالفعل؟
    <a routerLink="/auth/login">تسجيل الدخول</a>
  </footer>
</article>
