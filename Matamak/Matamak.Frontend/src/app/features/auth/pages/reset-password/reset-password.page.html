<article class="auth-card">
  <header>
    <p class="eyebrow">كلمة مرور جديدة</p>
    <h2>إعادة تعيين كلمة المرور</h2>
    <p>تحقق من الكود ثم اختر كلمة مرور جديدة لحسابك.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      البريد الإلكتروني
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label>
      كود التحقق
      <input type="text" formControlName="code" inputmode="numeric" maxlength="8" />
    </label>

    <label>
      كلمة المرور الجديدة
      <input type="password" formControlName="NewPassword" autocomplete="new-password" />
      @if (form.controls.NewPassword.touched && form.controls.NewPassword.invalid) {
        <span>كلمة المرور مطلوبة ولا تقل عن 6 أحرف.</span>
      }
    </label>

    <label>
      تأكيد كلمة المرور
      <input type="password" formControlName="ConfirmPassword" autocomplete="new-password" />
      @if (form.controls.ConfirmPassword.touched && form.hasError('passwordsMismatch')) {
        <span>كلمتا المرور غير متطابقتين.</span>
      }
    </label>

    @if (errorMessage()) {
      <p class="form-alert">{{ errorMessage() }}</p>
    }

    <button type="submit" class="primary-action" [disabled]="!form.valid || isSubmitting()">
      {{ isSubmitting() ? 'جاري التحديث...' : 'تحديث كلمة المرور' }}
    </button>
  </form>

  <footer>
    <a routerLink="/auth/login">العودة لتسجيل الدخول</a>
  </footer>
</article>
