<article class="auth-card">
  <header>
    <p class="eyebrow">تأكيد البريد</p>
    <h2>تفعيل الحساب</h2>
    <p>أدخل كود التفعيل المرسل إلى بريدك الإلكتروني.</p>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <label>
      البريد الإلكتروني
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label>
      كود التفعيل
      <input type="text" formControlName="code" inputmode="numeric" maxlength="8" />
      @if (form.controls.code.touched && form.controls.code.invalid) {
        <span>الكود مطلوب ويجب أن يحتوي على أرقام فقط.</span>
      }
    </label>

    @if (statusMessage()) {
      <p class="form-success">{{ statusMessage() }}</p>
    }

    @if (errorMessage()) {
      <p class="form-alert">{{ errorMessage() }}</p>
    }

    <button type="submit" class="primary-action" [disabled]="!form.valid || isSubmitting()">
      {{ isSubmitting() ? 'جاري التفعيل...' : 'تفعيل الحساب' }}
    </button>
  </form>

  <footer>
    <a routerLink="/auth/login">العودة لتسجيل الدخول</a>
  </footer>
</article>
